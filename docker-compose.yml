version: '3.8'
services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./api/postcards:/app/postcards

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    depends_on:
      - api
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
